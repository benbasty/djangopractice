{% extends "flights/layout.html" %}

{% block body %}
    <h1>All Flights</h1>
    <table>
        <tr>
          <th>ID</th>
          <th>Origin</th>
          <th>Destination</th>
          <th>Duration</th>
        </tr>
        <tr>
          {% for flight in flights %}
          <td><a href="{% url 'flight' flight.id %}">{{ flight.id }}</a></td>
          <td>{{ flight.origin }}</td>
          <td>{{ flight.destination }}</td>
          <td>{{ flight.duration }}</td>
        </tr>
          {% endfor %}
    </table>
{% endblock%}
