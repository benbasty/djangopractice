{% extends "flights/layout.html" %}

{% block body %}
    <h1>All Flights</h1>
    <table>
        <tr>
          <th>ID</th>
          <th>Origin</th>
          <th>Destination</th>
          <th>Duration</th>
        </tr>
        <tr>
          {% for flight in flights %}
          <td>{{ flight.id }}</td>
          <td>{{ flight.origin }}</td>
          <td>{{ flight.destination }}</td>
          <td>{{ flight.duration }}</td>
        </tr>
          {% endfor %}
      </table>
{% endblock%}
